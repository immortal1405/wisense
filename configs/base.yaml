seed: 42

data:
  dataset_path: data/dataset_normalized.pkl
  target: type
  include_configuration: false

split:
  mode: standard
  test_size: 0.15
  val_size: 0.15
  random_state: 42
  stratify_cols:
    - type
    - position

train:
  batch_size: 256
  num_workers: 0
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 8

model:
  name: cnn1d
  in_channels: 2
  seq_len: 52
  hidden_dim: 64

logging:
  output_dir: outputs
  run_name: cnn1d_type_baseline
